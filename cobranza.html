<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chela Sport | Cobranzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 bg-slate-900/50 backdrop-blur-md border-b border-slate-800 sticky top-0 z-40">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-black uppercase italic tracking-tighter italic">Cobranzas</h1>
            <div id="bcv-val" class="bg-indigo-600/20 text-indigo-400 px-3 py-1 rounded-full text-[10px] font-black border border-indigo-500/30 tracking-widest">
                BCV: --
            </div>
        </div>
        
        <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
            <input type="text" id="search-deudor" placeholder="Buscar por nombre o representante..." 
                class="w-full bg-slate-950 border border-slate-800 p-4 pl-10 rounded-2xl text-xs font-bold outline-none focus:border-indigo-500 transition-all">
        </div>
    </header>

    <main class="p-4">
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-slate-900 p-4 rounded-3xl border border-slate-800 shadow-lg">
                <p class="text-[8px] text-slate-500 font-black uppercase tracking-[0.2em] mb-1">Deuda Global</p>
                <p id="total-deuda-global" class="text-xl font-black text-red-400">$0.00</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-3xl border border-slate-800 shadow-lg">
                <p class="text-[8px] text-slate-500 font-black uppercase tracking-[0.2em] mb-1">Por Cobrar</p>
                <p class="text-xl font-black text-white"><span id="count-deudores">0</span> <span class="text-[10px] text-slate-500 uppercase">Alumnos</span></p>
            </div>
        </div>

        <div id="lista-deudores" class="space-y-3">
            <div class="text-center py-20 opacity-20 uppercase font-black tracking-widest text-xs">
                Cargando lista de estudiantes...
            </div>
        </div>
    </main>

    <div id="modal-abono" class="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex flex-col justify-end p-4 hidden">
        <div class="bg-slate-900 w-full max-w-md mx-auto rounded-[3rem] border border-slate-800 p-8 shadow-2xl">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h3 id="abono-nombre" class="text-white font-black uppercase text-sm tracking-tight leading-none mb-2">Abono: ---</h3>
                    <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest">Deuda actual: <span id="abono-deuda-actual" class="text-red-400">$0.00</span></p>
                </div>
                <button onclick="cerrarModalAbono()" class="text-slate-500 hover:text-white transition-colors">
                    <i class="fa-solid fa-circle-xmark text-2xl"></i>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[9px] text-slate-500 font-black uppercase ml-2 mb-1 block tracking-widest">Moneda del Abono</label>
                    <select id="select-moneda-abono" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-xs font-black uppercase text-indigo-400 outline-none">
                        <option value="USD">🇺🇸 Dólares ($)</option>
                        <option value="VES">🇻🇪 Bolívares (Bs)</option>
                    </select>
                </div>

                <div>
                    <label class="text-[9px] text-slate-500 font-black uppercase ml-2 mb-1 block tracking-widest">Monto Recibido</label>
                    <input type="number" id="input-monto-abono" inputmode="decimal" placeholder="0.00" 
                        class="w-full bg-slate-950 border border-slate-800 p-6 rounded-2xl text-center text-3xl font-black text-white outline-none focus:border-emerald-500 transition-all">
                </div>

                <button id="btn-confirma-abono" onclick="confirmarAbono()" 
                    class="w-full bg-indigo-600 hover:bg-indigo-500 p-5 rounded-2xl font-black uppercase text-xs tracking-[0.2em] shadow-lg shadow-indigo-900/20 active:scale-95 transition-all">
                    Procesar Abono ✅
                </button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-xl border-t border-slate-800 z-40 flex justify-around p-2 pb-safe">
        <a href="index.html" class="flex-1 flex flex-col items-center py-2 text-slate-500">
            <i class="fa-solid fa-cash-register text-xl"></i>
            <span class="text-[8px] uppercase font-black mt-1">Venta</span>
        </a>
        <a href="cobranza.html" class="flex-1 flex flex-col items-center py-2 text-indigo-500 border-t-2 border-indigo-500">
            <i class="fa-solid fa-hand-holding-dollar text-xl"></i>
            <span class="text-[8px] uppercase font-black mt-1">Cobros</span>
        </a>
        <a href="admin.html" class="flex-1 flex flex-col items-center py-2 text-slate-500">
            <i class="fa-solid fa-chart-pie text-xl"></i>
            <span class="text-[8px] uppercase font-black mt-1">Admin</span>
        </a>
    </nav>

    <script src="config.js"></script>
    <script src="cobranza.js"></script>

</body>
</html>
