<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Pago | Chela Sport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-white p-4 font-sans">
    <div class="max-w-md mx-auto bg-slate-900 rounded-[2.5rem] border border-slate-800 overflow-hidden shadow-2xl">
        <div class="bg-indigo-600 p-8 text-center relative">
            <div id="bcv-floating" class="absolute top-4 right-4 bg-black/20 px-3 py-1 rounded-full text-[9px] font-black tracking-widest">
                BCV: --
            </div>
            <i class="fa-solid fa-university text-3xl mb-4"></i>
            <h1 class="text-xl font-black uppercase tracking-widest">Reporte de Pago</h1>
            <p id="nombre-estudiante" class="text-[10px] font-bold opacity-80 uppercase mt-1">Cargando...</p>
        </div>

        <div class="p-6 space-y-6">
            <div class="text-center">
                <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1">Monto a Cancelar</p>
                <h2 id="monto-usd" class="text-4xl font-black text-emerald-400">$0.00</h2>
                <p id="monto-bs" class="text-lg font-black text-slate-400 mt-1">Bs. 0.00</p>
            </div>

            <div class="bg-black/30 p-5 rounded-2xl border border-slate-800">
                <p class="text-[9px] text-indigo-400 font-black uppercase mb-3 text-center tracking-widest">Banesco Pago Móvil</p>
                <div class="space-y-2 text-[11px] font-mono">
                    <div class="flex justify-between"><span class="text-slate-500">Banco:</span><span>0134 - Banesco</span></div>
                    <div class="flex justify-between"><span class="text-slate-500">Teléfono:</span><span>0412-2969255</span></div>
                    <div class="flex justify-between"><span class="text-slate-500">Cédula:</span><span>V-10383082</span></div>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-slate-500 font-black uppercase ml-2 mb-1 block">Referencia (4 últimos)</label>
                    <input type="text" id="ref" maxlength="4" placeholder="0000" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-center font-black text-xl text-white outline-none focus:border-indigo-500">
                </div>

                <div>
                    <label class="text-[10px] text-slate-500 font-black uppercase ml-2 mb-1 block">Captura del Comprobante</label>
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                    <button onclick="document.getElementById('file-input').click()" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                        <i class="fa-solid fa-camera text-indigo-400"></i>
                        <span id="file-name" class="text-xs font-bold text-slate-400">Elegir Archivo</span>
                    </button>
                </div>

                <button onclick="enviarReporte()" id="btn-enviar" class="w-full bg-indigo-600 p-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg shadow-indigo-900/40 active:scale-95 transition-all">
                    Subir Comprobante
                </button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://ekvzmfsdshyoeggudksm.supabase.co';
        const SB_KEY = 'sb_publishable_Go6ZDuD9pg1pC3k-s89jiQ_65TEYGnd';
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        const params = new URLSearchParams(window.location.search);
        const estId = params.get('estudiante');
        const montoUSD = parseFloat(params.get('monto') || 0);
        let tasaGlobal = 0;

        // 1. CARGAR DATOS Y TASA BCV
        async function init() {
            document.getElementById('monto-usd').innerText = `$${montoUSD.toFixed(2)}`;
            
            // Traer tasa
            try {
                const res = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
                const data = await res.json();
                tasaGlobal = data.promedio;
                document.getElementById('bcv-floating').innerText = `BCV: ${tasaGlobal.toFixed(2)}`;
                document.getElementById('monto-bs').innerText = `Bs. ${(montoUSD * tasaGlobal).toFixed(2)}`;
            } catch (e) { console.error("Error tasa"); }

            // Traer nombre estudiante
            if(estId) {
                const { data } = await _sb.from('estudiantes').select('name').eq('id', estId).single();
                if(data) document.getElementById('nombre-estudiante').innerText = `Deuda: ${data.name}`;
            }
        }
        init();

        document.getElementById('file-input').onchange = e => {
            const file = e.target.files[0];
            if(file) document.getElementById('file-name').innerText = file.name;
        };

        // 2. ENVIAR REPORTE CORREGIDO
        async function enviarReporte() {
            const ref = document.getElementById('ref').value;
            const file = document.getElementById('file-input').files[0];
            const btn = document.getElementById('btn-enviar');

            if(ref.length < 4 || !file) return alert("⚠️ Ingresa la referencia y adjunta la foto.");
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Subiendo...';

            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `pago_${Date.now()}.${fileExt}`;
                
                // A. Subida al Bucket
                const { error: uploadError } = await _sb.storage
                    .from('comprobantes')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                // B. Obtener URL Pública
                const { data: { publicUrl } } = _sb.storage.from('comprobantes').getPublicUrl(fileName);

                // C. Registro en Ventas (EL CAMBIO CRÍTICO ESTÁ AQUÍ)
                const montoBsCalculado = montoUSD * tasaGlobal;

                const { error: insertError } = await _sb.from('ventas').insert([{
                    id_orden: `REP-${ref}-${Date.now().toString().slice(-4)}`,
                    total_usd: montoUSD,           // Se queda en $ para tus gráficas
                    monto_original: montoBsCalculado, // Se guarda en Bs para tu banco
                    moneda: 'VES',
                    metodo_pago: `PAGO_MOVIL (Ref: ${ref})`,
                    status: 'pendiente_verificacion',
                    estudiante_id: estId,
                    comprobante_url: publicUrl,
                    tasa_referencia: tasaGlobal
                }]);

                if (insertError) throw insertError;

                window.location.href = "exito.html"; 

            } catch (e) {
                alert("Hubo un problema: " + e.message);
                btn.disabled = false;
                btn.innerText = "Subir Comprobante";
            }
        }
    </script>
</body>
</html>
