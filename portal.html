<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Familiar | Chela Sport 1972</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        input { 
            background: #0f172a !important; 
            border: 1px solid #1e293b !important; 
            color: white !important; 
            transition: all 0.2s; 
        }
        input:focus { 
            border-color: #6366f1 !important; 
            outline: none; 
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); 
        }

        /* Corregimos la incomodidad del PIN */
        .pin-field {
            letter-spacing: 0.5em;
            text-align: center;
            font-size: 1.5rem !important;
            font-weight: 900;
        }
    </style>
</head>
<body class="p-5 pb-10 flex justify-center items-start min-h-screen">

    <div class="w-full max-w-md">

        <div id="step-1" class="step active text-center mt-10">
            <div class="w-20 h-20 bg-indigo-600/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-indigo-500/30">
                <i class="fa-solid fa-hands-holding-child text-4xl text-indigo-400"></i>
            </div>
            <h1 class="text-4xl font-black uppercase tracking-tighter mb-2">Chela Sport</h1>
            <p class="text-indigo-400 text-[10px] font-black uppercase tracking-[0.4em] mb-12">Portal Familiar 1972</p>
            
            <div class="space-y-4">
                <button onclick="nextStep(2)" class="w-full bg-indigo-600 p-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg shadow-indigo-900/40 active:scale-95 transition-all">Registrar Nueva Familia</button>
                <button onclick="nextStep('login')" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl font-black uppercase text-xs tracking-widest text-slate-400 active:scale-95 transition-all">Acceder a mi Cuenta</button>
            </div>
        </div>

        <div id="step-2" class="step">
            <h2 class="text-2xl font-black uppercase mb-6 tracking-tighter italic">Registro de Representante</h2>
            <div class="space-y-4">
                <input type="text" id="reg-nombre" placeholder="Tu Nombre Completo" class="w-full p-4 rounded-xl font-bold">
                <input type="tel" id="reg-phone" placeholder="Tu WhatsApp (0412...)" class="w-full p-4 rounded-xl font-bold">
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-500 ml-2 mb-1 block">PIN Personal (4 dígitos)</label>
                    <input type="password" id="reg-pin" maxlength="4" inputmode="numeric" placeholder="****" class="pin-field w-full p-4 rounded-xl">
                </div>
                <button onclick="validarPaso1()" class="w-full bg-indigo-600 p-5 rounded-2xl font-black uppercase text-xs tracking-widest mt-4">Siguiente: Mis Hijos</button>
            </div>
        </div>

        <div id="step-3" class="step">
            <h2 class="text-2xl font-black uppercase mb-2 tracking-tighter italic text-indigo-400">Tus Niños</h2>
            <p class="text-[10px] text-slate-500 font-bold uppercase mb-6">Agrega a cada uno de tus hijos</p>
            <div id="hijos-inputs" class="space-y-3 mb-6"></div>
            <button onclick="addHijoInput()" class="w-full border-2 border-dashed border-slate-800 p-3 rounded-xl text-[10px] font-black uppercase text-slate-500 mb-8 hover:border-indigo-500 transition-colors">+ Añadir Representado</button>
            <button onclick="procesarRegistroFinal()" id="btn-save" class="w-full bg-emerald-600 p-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg">Finalizar y Entrar</button>
        </div>

        <div id="step-login" class="step">
            <h2 class="text-2xl font-black uppercase mb-8 tracking-tighter text-center">Identificación</h2>
            <div class="space-y-4">
                <input type="tel" id="login-phone" placeholder="Número de WhatsApp" class="w-full p-4 rounded-xl font-bold text-center text-lg">
                <input type="password" id="login-pin" maxlength="4" inputmode="numeric" placeholder="Tu PIN" class="pin-field w-full p-4 rounded-xl text-center">
                <button onclick="acceder()" id="btn-login" class="w-full bg-indigo-600 p-5 rounded-2xl font-black uppercase text-xs tracking-widest mt-4 shadow-lg active:scale-95 transition-all">Acceder al Dashboard</button>
                <button onclick="nextStep(1)" class="w-full text-[10px] font-black text-slate-600 uppercase mt-4">Cancelar y Volver</button>
            </div>
        </div>

        <div id="step-4" class="step">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Bienvenido/a</p>
                    <h2 id="dash-user" class="text-2xl font-black text-white italic">Cargando...</h2>
                </div>
                <button onclick="location.reload()" class="w-10 h-10 rounded-full bg-slate-900 border border-slate-800 flex items-center justify-center text-slate-500 hover:text-red-400">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>

            <div class="glass p-8 rounded-[2.5rem] mb-6 shadow-2xl relative border-t border-indigo-500/30 text-center">
                <p class="text-[10px] font-black uppercase text-indigo-400 mb-2">Deuda Familiar Consolidada</p>
                <h3 id="dash-deuda" class="text-5xl font-black text-white">$0.00</h3>
                <div id="dash-status" class="mt-4 inline-block px-3 py-1 rounded-full text-[9px] font-black border uppercase">...</div>
            </div>

            <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-4 ml-2">Cuentas Individuales</h3>
            <div class="space-y-3" id="dash-hijos-list"></div>

            <div class="mt-10 pt-6 border-t border-slate-800">
                <p class="text-[9px] font-black text-slate-600 uppercase mb-4 tracking-widest flex items-center gap-2">
                    <i class="fa-solid fa-user-shield text-indigo-500"></i> Panel de Control (Mauricio)
                </p>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="modificarLimite()" class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800 flex flex-col items-center gap-2 active:bg-slate-800">
                        <i class="fa-solid fa-sliders text-indigo-400"></i>
                        <span class="text-[9px] font-black uppercase">Subir Límite</span>
                    </button>
                    <button onclick="toggleBloqueoCuenta()" id="btn-bloquear-ui" class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800 flex flex-col items-center gap-2 active:bg-slate-800">
                        <i id="lock-icon" class="fa-solid fa-lock-open text-emerald-400"></i>
                        <span id="lock-text" class="text-[9px] font-black uppercase text-slate-300">Bloquear</span>
                    </button>
                </div>
            </div>
            
            <p class="text-center text-[8px] text-slate-700 font-bold uppercase tracking-[0.4em] mt-10">Envolvia IA • System v2.1</p>
        </div>
    </div>

    <script>
        const SB_URL = 'https://ekvzmfsdshyoeggudksm.supabase.co';
        const SB_KEY = 'sb_publishable_Go6ZDuD9pg1pC3k-s89jiQ_65TEYGnd';
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = { nombre: '', phone: '', pin: '' };

        function nextStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step-' + n).classList.add('active');
            window.scrollTo(0,0);
        }

        function addHijoInput() {
            const container = document.getElementById('hijos-inputs');
            const div = document.createElement('div');
            div.className = 'flex items-center gap-2';
            div.innerHTML = `
                <input type="text" class="hijo-nombre w-full p-4 rounded-xl font-bold bg-slate-900 border border-slate-800 text-white" placeholder="Nombre del Alumno">
                <button onclick="this.parentElement.remove()" class="text-slate-600 hover:text-red-500"><i class="fa-solid fa-circle-xmark text-xl"></i></button>
            `;
            container.appendChild(div);
        }

        function validarPaso1() {
            currentUser.nombre = document.getElementById('reg-nombre').value.trim();
            currentUser.phone = document.getElementById('reg-phone').value.trim();
            currentUser.pin = document.getElementById('reg-pin').value.trim();
            if(!currentUser.nombre || !currentUser.phone || currentUser.pin.length < 4) return alert("⚠️ Completa todos los campos correctamente.");
            
            document.getElementById('hijos-inputs').innerHTML = '';
            addHijoInput();
            nextStep(3);
        }

        async function procesarRegistroFinal() {
            const inputs = document.querySelectorAll('.hijo-nombre');
            let listaHijos = [];
            inputs.forEach(i => { if(i.value.trim()) listaHijos.push(i.value.trim()); });
            
            if(listaHijos.length === 0) return alert("⚠️ Agrega al menos un alumno.");

            const btn = document.getElementById('btn-save');
            btn.disabled = true; 
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Creando Perfiles...';

            try {
                const promesas = listaHijos.map(h => {
                    return _sb.from('estudiantes').insert([{
                        name: h, 
                        representante: currentUser.nombre, 
                        phone: currentUser.phone, 
                        pin_seguridad: currentUser.pin, 
                        debt: 0, 
                        limite_credito: 100, 
                        bloqueado: false
                    }]);
                });

                await Promise.all(promesas);
                abrirDashboard(currentUser.phone);
            } catch (err) { alert(err.message); btn.disabled = false; }
        }

        async function acceder() {
            const phone = document.getElementById('login-phone').value.trim();
            const pin = document.getElementById('login-pin').value.trim();
            const btn = document.getElementById('btn-login');

            if(!phone || !pin) return alert("⚠️ Ingresa tus credenciales.");

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verificando...';

            const { data, error } = await _sb.from('estudiantes').select('*').eq('phone', phone).eq('pin_seguridad', pin);
            
            if(data && data.length > 0) {
                abrirDashboard(phone);
            } else {
                alert("❌ PIN o Teléfono incorrectos.");
                btn.disabled = false;
                btn.innerHTML = 'Entrar al Dashboard';
            }
        }

        async function abrirDashboard(phone) {
            const { data } = await _sb.from('estudiantes').select('*').eq('phone', phone);
            if(!data || data.length === 0) return;

            // LÓGICA DE DATOS CORRECTA: Tomar el nombre del representante del registro real
            const repPrincipal = data[0].representante;
            document.getElementById('dash-user').innerText = repPrincipal;
            
            const totalDeuda = data.reduce((acc, h) => acc + parseFloat(h.debt || 0), 0);
            const isBloqueado = data.some(h => h.bloqueado);

            // UI del Saldo
            document.getElementById('dash-deuda').innerText = `$${totalDeuda.toFixed(2)}`;
            const status = document.getElementById('dash-status');
            status.innerText = isBloqueado ? 'CUENTA SUSPENDIDA' : 'CRÉDITO ACTIVO';
            status.className = `mt-4 inline-block px-3 py-1 rounded-full text-[9px] font-black border ${isBloqueado ? 'bg-red-900/20 text-red-500 border-red-500/40' : 'bg-emerald-900/20 text-emerald-500 border-emerald-500/40'}`;

            // Actualizar iconos de administración
            const lockIcon = document.getElementById('lock-icon');
            const lockText = document.getElementById('lock-text');
            if(isBloqueado) {
                lockIcon.className = "fa-solid fa-lock text-red-500";
                lockText.innerText = "Desbloquear";
            } else {
                lockIcon.className = "fa-solid fa-lock-open text-emerald-400";
                lockText.innerText = "Bloquear";
            }

            // Listado de Hijos
            document.getElementById('dash-hijos-list').innerHTML = data.map(h => `
                <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl flex justify-between items-center group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-indigo-400 font-black text-xs">
                            ${h.name.charAt(0)}
                        </div>
                        <div>
                            <p class="text-[11px] font-black uppercase text-slate-100">${h.name}</p>
                            <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">Límite: $${h.limite_credito}</p>
                        </div>
                    </div>
                    <div class="text-right">
                         <p class="text-[8px] text-slate-500 font-black uppercase mb-1">Deuda</p>
                         <p class="text-sm font-black ${h.debt > 0 ? 'text-red-400' : 'text-slate-400'}">$${parseFloat(h.debt).toFixed(2)}</p>
                    </div>
                </div>
            `).join('');

            currentUser.phone = phone; // Guardar sesión local
            nextStep(4);
        }

        // FUNCIONES ADMINISTRATIVAS (MAURICIO)
        async function modificarLimite() {
            const nuevo = prompt("Establecer nuevo límite de crédito familiar ($):");
            if(nuevo && !isNaN(nuevo)) {
                await _sb.from('estudiantes').update({ limite_credito: nuevo }).eq('phone', currentUser.phone);
                abrirDashboard(currentUser.phone);
            }
        }

        async function toggleBloqueoCuenta() {
            const { data } = await _sb.from('estudiantes').select('bloqueado').eq('phone', currentUser.phone).limit(1);
            const nuevoEstado = !data[0].bloqueado;
            
            await _sb.from('estudiantes').update({ bloqueado: nuevoEstado }).eq('phone', currentUser.phone);
            alert(`Cuenta ${nuevoEstado ? 'BLOQUEADA' : 'DESBLOQUEADA'} correctamente.`);
            abrirDashboard(currentUser.phone);
        }
    </script>
</body>
</html>
