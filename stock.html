<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chela Sport | Inventario y Compras</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #6366f1; border-top: 2px solid #6366f1; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="overflow-x-hidden pb-24 selection:bg-indigo-500/30">

    <div id="app-content" class="transition-opacity duration-300">
        
        <header class="bg-slate-900/90 backdrop-blur-md border-b border-slate-800 p-4 sticky top-0 z-40 flex justify-between items-center shadow-sm">
            <h1 class="font-black text-white text-sm uppercase tracking-widest flex items-center gap-2">
                <i class="fa-solid fa-boxes-stacked text-indigo-500"></i> Inventario
            </h1>
            <div class="flex items-center gap-3">
                <span id="bcv-val" class="bg-emerald-900/20 text-emerald-400 border border-emerald-500/30 px-3 py-1.5 rounded-full text-[10px] font-black tracking-widest">BCV: --</span>
            </div>
        </header>

        <main class="p-4">
            <div class="flex gap-2 mb-6">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass text-slate-500 absolute left-4 top-1/2 -translate-y-1/2"></i>
                    <input type="text" id="search-stock" oninput="renderStock()" placeholder="Buscar producto o proveedor..." class="w-full bg-slate-900 border border-slate-800 py-4 pl-12 pr-4 rounded-2xl outline-none focus:border-indigo-500 text-sm shadow-inner transition-colors">
                </div>
                
                <button id="btn-compras-ia" onclick="abrirModalCompras()" class="hidden bg-indigo-600 hover:bg-indigo-500 text-white w-14 rounded-2xl flex justify-center items-center active:scale-95 transition-transform shadow-lg shadow-indigo-900/30">
                    <i class="fa-solid fa-robot text-xl"></i>
                </button>

                <button onclick="abrirModalFactura()" class="bg-emerald-600 hover:bg-emerald-500 text-white w-14 rounded-2xl flex justify-center items-center active:scale-95 transition-transform shadow-lg shadow-emerald-900/30">
                    <i class="fa-solid fa-file-invoice text-xl"></i>
                </button>
            </div>

            <div id="stock-list" class="space-y-3 pb-8"></div>
        </main>

        <div id="modal-factura" class="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex flex-col hidden transition-all">
            <header class="bg-slate-900 border-b border-slate-800 p-5 flex justify-between items-center">
                <h2 class="font-black uppercase tracking-widest text-sm flex items-center gap-2 text-emerald-400">
                    <i class="fa-solid fa-truck-ramp-box"></i> Ingresar Factura
                </h2>
                <button onclick="cerrarModalFactura()" class="text-slate-400 hover:text-white bg-slate-800 w-8 h-8 rounded-full flex justify-center items-center active:scale-90 border border-slate-700"><i class="fa-solid fa-xmark"></i></button>
            </header>
            <div class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="bg-indigo-900/20 border border-indigo-500/30 p-3 rounded-xl text-xs text-indigo-300 font-bold mb-4">
                    Agrega los productos y las cantidades que llegaron.
                </div>
                <div id="factura-filas" class="space-y-3"></div>
                <button onclick="agregarFilaFactura()" class="w-full bg-slate-800 border border-slate-700 hover:border-emerald-500 text-emerald-400 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-colors border-dashed">
                    <i class="fa-solid fa-plus mr-1"></i> Añadir Otro Producto
                </button>
            </div>
            <div class="bg-slate-900 border-t border-slate-800 p-6 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
                <button onclick="guardarFacturaMasiva()" id="btn-save-factura" class="w-full bg-emerald-600 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 shadow-lg flex justify-center items-center gap-2">
                    <i class="fa-solid fa-check"></i> Procesar Factura
                </button>
            </div>
        </div>

        <div id="modal-editar" class="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex flex-col hidden transition-all">
            <header class="bg-slate-900 border-b border-slate-800 p-5 flex justify-between items-center">
                <h2 class="font-black uppercase tracking-widest text-sm flex items-center gap-2 text-indigo-400">
                    <i class="fa-solid fa-pen-ruler"></i> Editar Producto
                </h2>
                <button onclick="document.getElementById('modal-editar').classList.add('hidden')" class="text-slate-400 hover:text-white bg-slate-800 w-8 h-8 rounded-full flex justify-center items-center active:scale-90 border border-slate-700"><i class="fa-solid fa-xmark"></i></button>
            </header>
            
            <div class="p-6 space-y-4 overflow-y-auto">
                <input type="hidden" id="edit-id">
                
                <div>
                    <label class="text-[10px] text-slate-400 uppercase font-black tracking-widest ml-2 mb-1 block">Nombre del Producto</label>
                    <input type="text" id="edit-name" class="w-full bg-slate-900 border border-slate-800 text-white p-4 rounded-xl font-bold text-sm outline-none focus:border-indigo-500">
                </div>

                <div>
                    <label class="text-[10px] text-slate-400 uppercase font-black tracking-widest ml-2 mb-1 block">Proveedor / Fábrica</label>
                    <input type="text" id="edit-proveedor" placeholder="Ej: Textilera Caracas" class="w-full bg-slate-900 border border-slate-800 text-indigo-300 p-4 rounded-xl font-bold text-sm outline-none focus:border-indigo-500">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase font-black tracking-widest ml-2 mb-1 block">Precio Venta ($)</label>
                        <input type="number" id="edit-price" step="0.01" inputmode="decimal" class="w-full bg-slate-900 border border-slate-800 text-emerald-400 p-4 rounded-xl font-black text-lg outline-none focus:border-indigo-500 text-center">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase font-black tracking-widest ml-2 mb-1 block">Stock Actual</label>
                        <input type="number" id="edit-stock" inputmode="numeric" class="w-full bg-slate-900 border border-slate-800 text-white p-4 rounded-xl font-black text-lg outline-none focus:border-indigo-500 text-center">
                    </div>
                </div>

                <button onclick="guardarEdicionAdmin()" id="btn-save-edit" class="w-full bg-indigo-600 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 flex justify-center items-center gap-2 mt-4 shadow-lg shadow-indigo-900/30">
                    <i class="fa-solid fa-floppy-disk"></i> Guardar Cambios
                </button>
            </div>
        </div>

        <div id="modal-compras" class="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex flex-col hidden transition-all">
            <header class="bg-slate-900 border-b border-slate-800 p-5 flex justify-between items-center">
                <h2 class="font-black uppercase tracking-widest text-sm flex items-center gap-2 text-indigo-400">
                    <i class="fa-solid fa-robot"></i> Asistente de Compras
                </h2>
                <button onclick="document.getElementById('modal-compras').classList.add('hidden')" class="text-slate-400 hover:text-white bg-slate-800 w-8 h-8 rounded-full flex justify-center items-center active:scale-90 border border-slate-700"><i class="fa-solid fa-xmark"></i></button>
            </header>
            
            <div class="p-6 overflow-y-auto flex-1">
                <p class="text-xs text-slate-400 font-bold mb-4 leading-relaxed">El sistema ha agrupado los productos con <span class="text-red-400 font-black">stock bajo (5 o menos)</span> por proveedor. Selecciona uno para exportar el pedido a WhatsApp.</p>
                
                <div id="lista-proveedores-ia" class="space-y-3">
                    </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-xl border-t border-slate-800 z-40 flex justify-around p-2 pb-safe shadow-[0_-5px_20px_rgba(0,0,0,0.3)]">
            <a href="index.html" class="nav-btn flex-1 flex flex-col items-center py-2 text-slate-400 hover:text-slate-300">
                <i class="fa-solid fa-cash-register text-xl mb-1"></i><span class="text-[8px] uppercase font-black tracking-widest mt-1">Venta</span>
            </a>
            <a href="stock.html" class="nav-btn active-tab flex-1 flex flex-col items-center py-2 text-indigo-400">
                <i class="fa-solid fa-boxes-stacked text-xl mb-1"></i><span class="text-[8px] uppercase font-black tracking-widest mt-1">Stock</span>
            </a>
            <a href="cobranza.html" class="nav-btn flex-1 flex flex-col items-center py-2 text-slate-400 hover:text-slate-300">
                <i class="fa-solid fa-hand-holding-dollar text-xl mb-1"></i><span class="text-[8px] uppercase font-black tracking-widest mt-1">Cobros</span>
            </a>
            <a href="admin.html" id="btn-dashboard" class="nav-btn flex-1 flex flex-col items-center py-2 text-slate-400 hidden hover:text-slate-300">
                <i class="fa-solid fa-chart-pie text-xl mb-1"></i><span class="text-[8px] uppercase font-black tracking-widest mt-1">Admin</span>
            </a>
        </nav>
    </div>

    <script src="stock.js"></script>
</body>
</html>
