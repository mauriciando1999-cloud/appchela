<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envolvia | Verificador Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #020617; font-family: 'Inter', sans-serif; color: white; }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        .pulse-border { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { border-color: rgba(99, 102, 241, 0.2); } 50% { border-color: rgba(99, 102, 241, 0.8); } 100% { border-color: rgba(99, 102, 241, 0.2); } }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto space-y-6">
        <header class="p-8 text-center bg-slate-900/50 rounded-[3rem] border border-slate-800">
            <div class="inline-block p-4 bg-indigo-600/20 rounded-full mb-4 border border-indigo-500/30">
                <i class="fa-solid fa-shield-check text-3xl text-indigo-500"></i>
            </div>
            <h1 class="text-3xl font-black uppercase italic tracking-tighter">Verificador</h1>
            <p class="text-[10px] text-indigo-400 font-black uppercase tracking-[0.3em]">Módulo de Seguridad Chela Sport</p>
        </header>

        <div id="lista-pendientes" class="space-y-4 pb-20"></div>
    </div>

    <script>
        const SB_URL = 'https://ekvzmfsdshyoeggudksm.supabase.co';
        const SB_KEY = 'sb_publishable_Go6ZDuD9pg1pC3k-s89jiQ_65TEYGnd'; 
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        async function cargarPendientes() {
            try {
                const { data: pendientes, error } = await _sb
                    .from('ventas')
                    .select('*')
                    .eq('status', 'pendiente_verificacion')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                const contenedor = document.getElementById('lista-pendientes');
                
                if (!pendientes || pendientes.length === 0) {
                    contenedor.innerHTML = `<div class="text-center py-20 opacity-40 uppercase font-black text-[10px] tracking-widest">Sin pendientes</div>`;
                    return;
                }

                contenedor.innerHTML = pendientes.map(v => `
                    <div class="bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] card-shadow relative overflow-hidden pulse-border mb-4">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/30 text-[9px] font-black px-3 py-1 rounded-full uppercase italic">${v.metodo_pago}</span>
                                <div class="text-4xl font-black text-white mt-4">$${parseFloat(v.total_usd).toFixed(2)}</div>
                                <p class="text-[11px] text-slate-400 font-bold mt-1 uppercase italic">${v.estudiante_nombre || 'Cliente'}</p>
                            </div>
                        </div>

                        ${v.comprobante_url ? `
                        <button onclick="window.open('${v.comprobante_url}', '_blank')" class="w-full mb-4 bg-indigo-600/20 border border-indigo-500/30 text-indigo-400 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest active:scale-95 transition-all">
                            <i class="fa-solid fa-image mr-2"></i> Ver Comprobante
                        </button>
                        ` : ''}

                        <div class="flex gap-3">
                            <button onclick="verificarPago(${v.id}, 'completado')" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg active:scale-95 transition-all">Autorizar ✅</button>
                            <button onclick="rechazarPago(${v.id})" class="bg-slate-800 text-red-500 px-6 py-4 rounded-2xl active:scale-95 border border-slate-700"><i class="fa-solid fa-xmark text-lg"></i></button>
                        </div>
                    </div>`).join('');
            } catch (err) { console.error(err); }
        }

        async function verificarPago(id, nuevoEstado) {
            await _sb.from('ventas').update({ status: nuevoEstado }).eq('id', id);
            cargarPendientes();
        }

        async function rechazarPago(id) {
            if(confirm("¿Rechazar esta venta?")) {
                await _sb.from('ventas').update({ status: 'rechazado' }).eq('id', id);
                cargarPendientes();
            }
        }

        function formatRelativeTime(date) { return "Ahora"; } // Simplificado

        // Realtime
        _sb.channel('db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'ventas' }, () => cargarPendientes()).subscribe();
        cargarPendientes();
    </script>
</body>
</html>
