<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envolvia | Verificador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; font-family: 'Inter', sans-serif; }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
    </style>
</head>
<body class="text-white p-4">
    <div class="max-w-md mx-auto space-y-4">
        <header class="p-8 text-center">
            <div class="inline-block p-3 bg-indigo-600/20 rounded-2xl mb-4 border border-indigo-500/30">
                <i class="fa-solid fa-shield-check text-2xl text-indigo-500"></i>
            </div>
            <h1 class="text-2xl font-black uppercase italic tracking-tighter">Verificador</h1>
            <p class="text-[10px] text-slate-500 font-black uppercase tracking-[0.2em]">Validación de Ingresos Chela Sport</p>
        </header>

        <div id="lista-pendientes" class="space-y-4 pb-20">
            <div class="text-center py-20 opacity-20">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl"></i>
            </div>
        </div>
    </div>

    <script>
        // 1. CONFIGURACIÓN
        const SB_URL = 'https://ekvzmfsdshyoeggudksm.supabase.co';
        const SB_KEY = 'sb_publishable_Go6ZDuD9pg1pC3k-s89jiQ_65TEYGnd'; 
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        // 2. MOTOR DE CARGA
        async function cargarPendientes() {
            try {
                const { data: pendientes, error } = await _sb
                    .from('ventas')
                    .select('*')
                    .eq('status', 'pendiente_verificacion')
                    .order('fecha', { ascending: false });

                if (error) throw error;

                const contenedor = document.getElementById('lista-pendientes');
                
                if (!pendientes || pendientes.length === 0) {
                    contenedor.innerHTML = `
                        <div class="text-center py-20">
                            <i class="fa-solid fa- BCH-check-double text-4xl text-slate-800 mb-4"></i>
                            <p class="text-slate-600 uppercase font-black text-[10px] tracking-widest">Todo verificado por ahora</p>
                        </div>`;
                    return;
                }

                contenedor.innerHTML = pendientes.map(v => {
                    // Lógica de colores por método
                    const isCredito = v.metodo_pago === 'CREDITO';
                    const colorBadge = isCredito ? 'bg-orange-600/20 text-orange-500 border-orange-500/30' : 'bg-indigo-600/20 text-indigo-400 border-indigo-500/30';
                    const icono = isCredito ? '<i class="fa-solid fa-graduation-cap mr-1"></i>' : '<i class="fa-solid fa-university mr-1"></i>';
                    
                    return `
                    <div class="bg-slate-900/50 border border-slate-800 p-6 rounded-[2.5rem] card-shadow backdrop-blur-sm">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <span class="border ${colorBadge} text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-tighter">
                                    ${icono} ${v.metodo_pago}
                                </span>
                                <div class="text-3xl font-black text-emerald-400 mt-3 tracking-tighter">$${parseFloat(v.total_usd).toFixed(2)}</div>
                                ${v.estudiante_nombre ? `<p class="text-[11px] text-slate-300 font-bold mt-1 uppercase italic">👤 ${v.estudiante_nombre}</p>` : ''}
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-slate-600 font-black uppercase">Hora</p>
                                <p class="text-xs font-mono text-slate-400 font-bold">
                                    ${new Date(v.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                </p>
                            </div>
                        </div>

                        <div class="flex gap-3">
                            <button onclick="verificarPago(${v.id}, 'completada')" 
                                class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg shadow-emerald-900/20 active:scale-95 transition-all">
                                Autorizar ✅
                            </button>
                            <button onclick="verificarPago(${v.id}, 'rechazada')" 
                                class="bg-slate-800 hover:bg-red-900/30 text-red-500 px-6 py-4 rounded-2xl active:scale-95 transition-all border border-slate-700">
                                <i class="fa-solid fa-xmark text-lg"></i>
                            </button>
                        </div>
                    </div>`;
                }).join('');

            } catch (err) {
                console.error("Error cargando pendientes:", err);
            }
        }

        // 3. ACCIÓN DE VERIFICAR
        async function verificarPago(id, nuevoEstado) {
            const { error } = await _sb
                .from('ventas')
                .update({ status: nuevoEstado })
                .eq('id', id);
            
            if (!error) {
                // Efecto de sonido sutil o vibración si es mobile
                if (window.navigator.vibrate) window.navigator.vibrate(50);
                cargarPendientes();
            } else {
                alert("Error al procesar: " + error.message);
            }
        }

        // 4. CICLO DE VIDA
        setInterval(cargarPendientes, 15000); // Refresca cada 15 segundos
        cargarPendientes();
    </script>
</body>
</html>
